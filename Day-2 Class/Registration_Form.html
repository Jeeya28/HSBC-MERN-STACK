<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    
    <marquee behavior="scroll" direction="left" loop="2" bgcolor="red" height="100" scrollamount="15">
      <h1 align="">Job Registration Form </h1>
    </marquee>

    <form action="">
        <fieldset>
            <legend>Job Application</legend>
            <label for="fname">First Name:</label>
            <input type="text" required minlength="3" maxlength="10" id="fname" placeholder="Enter Your First Name">
            <br><br>

            <label for="lname">Last Name :</label>
            <input type="text" required id="lname" placeholder="Enter Your Last Name">
            <br><br>
            <label for="">Age :</label>
            <input type="number" required min="18" max="25" placeholder="18+">
            <br><br>

            <label for="">Date Of Birth: </label>
            <input type="date" required>
            <br>
            <br>

            <label for="">Email:</label>
            <input type="email" required placeholder="Enter Your Email">

            <br><br>

            <label for="">Phone:</label>
            <input type="tel" required pattern="[0-9]{10}" placeholder="+91">

            <br><br>
            <label for="">Gender :</label>
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
            <br><br>
            <label for="">State :</label>
            <select name="" id="" required>
                <option value="">Choose State</option>
                <option value="Karnataka">KA</option>
                <option value="Telangana">TL</option>
                <option value="">TN</option>
                <option value="">KL</option>
                <option value="">AP</option>
            </select>
            <br><br>
            <label for="">Address :</label>
            <textarea rows="3" required cols="30" placeholder="Enter Full address"></textarea>
            <br><br>
            <label for="">Skills :</label>
            <input type="checkbox"  name="skills">Web Technologies
            <input type="checkbox" name="skills">Java
            <input type="checkbox" name="skills">Power BI
            <input type="checkbox" name="skills">MongoDb
            <br><br>
            <label for="">Resume: </label>
            <input type="file" required>
            <br><br>
            <button type="submit">Register</button>
        </fieldset>
    </form>
</body>

</html>
